name: contoso_dbt_raw.stores
type: bq.source
description: |-
  Store dimension table for Contoso retail business, sourced from Microsoft's SQLBI Contoso V2 dataset. Contains master data for 74 retail store locations across multiple countries, providing comprehensive information about physical store attributes, operational status, and geographic positioning.

  This table serves as the primary store dimension in the data warehouse, enabling geographic analysis of sales performance, operational reporting by region, store capacity planning through square footage metrics, and historical tracking of store lifecycle events. Store records include both active and closed locations with precise operational date tracking.

  The data is essential for location-based analytics, joined to sales fact tables via store_key to analyze performance by geography, store size, and operational tenure. Critical for territory planning, real estate decisions, inventory allocation, and regional performance reporting across the retail network.

  Physical characteristics like square_meters enable capacity-based analysis and comparison, while the geographic hierarchy (country/state) supports regional rollups. Status tracking allows filtering for active locations vs historical analysis including closed stores.

  Imported table: contoso_dbt_raw.stores
