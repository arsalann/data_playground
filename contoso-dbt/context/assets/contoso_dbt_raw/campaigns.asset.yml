owner: marketing_team

columns:
  - name: budget_amount
    type: FLOAT
    description: Planned budget allocation for the campaign in the specified currency. Used for variance analysis against actual spend_amount.
  - name: campaign_key
    type: INTEGER
    description: Primary key identifier for the campaign. Links to ad_spend_daily and campaign_attribution tables for detailed performance tracking.
    primary_key: true
    checks:
      - name: not_null
      - name: unique
  - name: campaign_name
    type: STRING
    description: Human-readable campaign name for identification and reporting. Typically includes product/segment indicators.
    checks:
      - name: not_null
  - name: channel
    type: STRING
    description: Marketing channel for the campaign (e.g., 'social_media', 'search', 'display', 'email'). Used for channel performance comparison.
    checks:
      - name: not_null
  - name: currency
    type: STRING
    description: Currency code for budget_amount and spend_amount values. Likely ISO 4217 format (USD, EUR, etc.).
    checks:
      - name: not_null
  - name: end_date
    type: DATE
    description: Campaign end date. Used with start_date to calculate campaign duration and performance periods.
  - name: extracted_at
    type: TIMESTAMP
    description: Timestamp when this record was ingested from the source system. Used for data lineage and debugging.
    checks:
      - name: not_null
  - name: product_key
    type: FLOAT
    description: Foreign key reference to products.product_key. Links campaigns to specific products they promote. Note unusual FLOAT type suggests possible data quality issue.
  - name: spend_amount
    type: FLOAT
    description: Actual amount spent on the campaign to date in the specified currency. Compared against budget_amount for variance analysis.
  - name: start_date
    type: DATE
    description: Campaign launch date. Used with end_date to define campaign duration and active periods for performance calculations.
    checks:
      - name: not_null
  - name: target_segment
    type: STRING
    description: Target customer segment or demographic for the campaign (e.g., 'millennials', 'enterprise', 'SMB'). Used for audience analysis and personalization.
