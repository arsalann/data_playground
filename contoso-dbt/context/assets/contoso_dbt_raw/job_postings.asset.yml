columns:
  - name: applicants
    type: INTEGER
    description: Total number of applications received for this job posting, used for recruitment funnel analysis and position competitiveness metrics
  - name: closed_date
    type: DATE
    description: Date when the job posting was closed or removed from active recruiting, marking end of application acceptance period
  - name: department_key
    type: INTEGER
    description: Foreign key reference to departments table, identifying the organizational department for this position (1-12 range covering all business functions)
    checks:
      - name: not_null
  - name: extracted_at
    type: TIMESTAMP
    description: Technical timestamp indicating when this record was extracted from the source system, used for data lineage and freshness tracking
    checks:
      - name: not_null
  - name: job_title
    type: STRING
    description: Descriptive title of the position being recruited, ranging from store roles (Sales Associate, Cashier) to corporate positions (Manager, Analyst)
    checks:
      - name: not_null
  - name: posted_date
    type: DATE
    description: Date when the job posting was published and became available for applications, marking start of recruitment timeline
    checks:
      - name: not_null
  - name: posting_key
    type: INTEGER
    description: Primary identifier for each job posting record, unique across all recruitment activities and time periods
    checks:
      - name: not_null
      - name: unique
  - name: status
    type: STRING
    description: Current lifecycle status of the job posting (e.g., Active, Closed, Filled, Cancelled), indicating recruitment stage and availability
    checks:
      - name: not_null
  - name: store_key
    type: FLOAT
    description: Foreign key reference to stores table for location-specific positions; NULL for corporate roles that are not tied to specific store locations
