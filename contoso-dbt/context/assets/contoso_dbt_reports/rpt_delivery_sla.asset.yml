columns:
  - name: avg_cost_per_shipment
    type: FLOAT
    description: Average shipping cost per shipment in USD for the month/carrier/country combination
  - name: avg_days_in_transit
    type: FLOAT
    description: Average number of days from ship_date to delivery_date, measuring carrier transit efficiency
  - name: avg_days_to_ship
    type: FLOAT
    description: Average number of days from order_date to ship_date, measuring internal fulfillment speed
  - name: avg_total_lead_days
    type: FLOAT
    description: Average total lead time in days from order_date to delivery_date (end-to-end customer experience)
  - name: carrier
    type: STRING
    description: Shipping carrier/logistics provider name (e.g., FedEx, UPS, DHL)
  - name: delivered_count
    type: INTEGER
    description: Number of shipments with status 'Delivered' successfully reaching customers
  - name: delivery_rate
    type: FLOAT
    description: Delivery success rate as percentage (delivered_count / shipment_count * 100), key SLA metric
  - name: lost_count
    type: INTEGER
    description: Number of shipments with status 'Lost' during transit or delivery
  - name: month
    type: INTEGER
    description: Month number (1-12) extracted from order_date, used for temporal aggregation
  - name: p95_lead_days
    type: INTEGER
    description: 95th percentile of total lead days, indicating worst-case delivery timeframes for SLA monitoring
  - name: returned_count
    type: INTEGER
    description: Number of shipments with status 'Returned' due to delivery failures or customer refusal
  - name: shipment_count
    type: INTEGER
    description: Total number of shipments for the month/carrier/country combination, denominator for rate calculations
  - name: store_country
    type: STRING
    description: Country name of the originating store/warehouse location for shipments
  - name: total_ship_cost
    type: FLOAT
    description: Total shipping costs in USD for all shipments in the month/carrier/country group
  - name: year
    type: INTEGER
    description: Year extracted from order_date, used for temporal aggregation and trending analysis
