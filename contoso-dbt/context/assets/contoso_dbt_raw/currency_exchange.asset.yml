name: contoso_dbt_raw.currency_exchange
type: bq.source
description: |-
  Daily foreign exchange rates for multi-currency financial calculations in the Contoso e-commerce platform.

  This table provides currency conversion rates between different currency pairs, enabling accurate financial
  reporting and analysis across the global Contoso business operations. The rates are used primarily by the
  sales fact table to convert transaction amounts into a consistent reporting currency (typically USD).

  The data represents market exchange rates captured daily and includes both major currency pairs (USD/EUR,
  USD/GBP) and emerging market currencies to support Contoso's international customer base. Each row
  represents a specific exchange rate between two currencies on a given date.

  Source data comes from the SQLBI Contoso V2 dataset, providing realistic foreign exchange rate patterns
  for business intelligence demonstrations and training scenarios.

