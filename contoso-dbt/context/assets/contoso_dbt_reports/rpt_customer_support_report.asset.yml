name: contoso_dbt_reports.rpt_customer_support_report
type: bq.source
description: |-
  Customer Support KPI Report - Monthly aggregated metrics for support ticket performance analysis

  This report provides comprehensive support operations insights aggregated by year, month, channel, and category.
  Built from deduplicated support tickets (~150K raw records) to track key performance indicators including:
  - Resolution rates and timeframes
  - Agent productivity metrics
  - Customer satisfaction scores
  - Ticket volume and priority distributions
  - Escalation patterns across channels

  The data undergoes deduplication based on support_ticket_key (latest extracted_at wins) before aggregation.
  Metrics exclude unresolved tickets from resolution time calculations but include them in volume counts.
  This table serves as the primary source for support management dashboards and operational reporting.

