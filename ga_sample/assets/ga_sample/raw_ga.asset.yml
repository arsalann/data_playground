  - name: clientId
    type: STRING
    description: Client identifier used to identify unique clients across sessions (null in obfuscated demo dataset)
  - name: customDimensions
    type: RECORD
    description: Custom dimensions configured in Google Analytics containing additional data
  - name: date
    type: STRING
    description: Date of the session in YYYYMMDD format
    checks:
      - name: not_null
  - name: device
    type: RECORD
    description: Device information including browser, operating system, and device category
  - name: fullVisitorId
    type: STRING
    description: Unique identifier for each visitor across all sessions and devices (not unique per row — one visitor can have multiple sessions)
    checks:
      - name: not_null
  - name: geoNetwork
    type: RECORD
    description: Geographic information including country, region, city, and network domain
  - name: hits
    type: RECORD
    description: Hit-level data containing pageviews, events, transactions, and other interactions
  - name: socialEngagementType
    type: STRING
    description: Type of social engagement for the session (e.g., 'Not Socially Engaged')
    checks:
      - name: not_null
  - name: totals
    type: RECORD
    description: Session totals including bounces, hits, pageviews, and session duration
  - name: trafficSource
    type: RECORD
    description: Traffic source information including source, medium, campaign, and referral path
  - name: userId
    type: STRING
    description: User identifier when available (only for authenticated users)
