name: Multi-city Polymarket Weather - sensor anomaly survey
description: |
  Hourly temperature traces for the resolution station + same-city peers + the
  Open-Meteo gridded reanalysis on each city's #1 primary-station anomaly day,
  with the Polymarket winning-bucket Yes-price overlaid on the same axis.
connection: bruin-playground-arsalan
theme: ibm-cb-dark

rows:
  # 2026-04-25 Seoul - Incheon RKSI primary anomaly
  - widgets:
      - name: Seoul 2026-04-25 overview
        type: text
        col: 12
        content: |
          # 2026-04-25 - every Seoul sensor (with the 20 °C-bucket Yes-price overlaid)

          **Hourly air temperature for the five Seoul-area METAR-fed stations plus the Open-Meteo gridded reanalysis
          across the 24 hours of 2026-04-25 local. From 12:00 onward Incheon (the Polymarket resolution station) sits
          3-8 °C below every same-city peer - peer-residual -6.9 °C at 14:00, robust peer-z -4.6, with five
          consecutive primary-station anomaly hours flagged. Incheon peaks at 21 °C at 12:00 and falls to 18 °C by
          15:00, while peer stations continue warming to 26 °C. The Polymarket Yes-price for the 20 °C bucket is the
          last tick within each hour: it stays near 0.10-0.15 from 14:00 through 22:00, then climbs toward 1.0
          overnight as Wunderground's daily-max for RKSI settles at 20 °C.**

          **Left axis:** temperature (°C). **Right axis:** Polymarket Yes-price for the 20 °C bucket (0-1, dashed). **X-axis:** local hour-of-day, Asia/Seoul.
  - widgets:
      - name: Seoul 2026-04-25 hourly chart
        hideName: true
        type: chart
        chart: line
        col: 12
        file: queries/seoul_drill_in.sql
        x: time_label
        y:
          - incheon
          - seoul
          - kimpo
          - seoul_e_ab
          - yongsan
          - open_meteo_grid
        yLabel: Temperature (°C)
        yRight: [yes_price]
        yRightLabel: Yes-probability
        seriesNames:
          incheon: Incheon RKSI (primary)
          seoul: Seoul (47108)
          kimpo: Kimpo RKSS
          seoul_e_ab: Seoul E Ab RKSM
          yongsan: Yongsan RKSY
          open_meteo_grid: Open-Meteo grid
          yes_price: Polymarket Yes-price
  - widgets:
      - name: Sources, tools, and limitations - Seoul 2026-04-25 overlay
        type: text
        col: 12
        content: |
          **Sources:** **[Meteostat](https://meteostat.net)**, **[Open-Meteo](https://archive-api.open-meteo.com/v1/archive)**, **[Polymarket CLOB](https://clob.polymarket.com/prices-history)**.

          **Tools:** **Bruin cli** (pipeline), **BigQuery** (warehouse), **Bruin dac** (visualization).

          **Limitations:** Stations are sampled at the top of every UTC hour, so sub-hour spikes can fall between
          samples - only the recovery leg shows in the archive. The dashed price line is the last CLOB tick within
          each hour; intra-hour movement is not visible. Polymarket resolves on Wunderground's RKSI feed, which
          rounds slightly differently than Meteostat's hourly maxes - that is why bucket 20 °C resolved YES even
          though Meteostat's hourly peak at Incheon was 21 °C. Trader identity and on-chain wallet attribution are
          out of scope. (Dual-axis line chart provided by a fork-local DAC patch - see `DAC.md`.)

  # 2026-04-26 London - City Airport EGLC primary anomaly
  - widgets:
      - name: London 2026-04-26 overview
        type: text
        col: 12
        content: |
          # 2026-04-26 - every London sensor (with the 17 °C-bucket Yes-price overlaid)

          **Hourly air temperature for the five London-area METAR-fed stations plus the Open-Meteo gridded reanalysis
          across the 24 hours of 2026-04-26 local. At 05:00 London City (the Polymarket resolution station) reads
          9 °C while same-city peers average 6.1 °C - peer-residual +2.9 °C, robust peer-z 19.6, just below the
          strict 3 °C anomaly threshold but a clear single-station divergence at the primary. The Polymarket
          Yes-price for the 17 °C bucket is the last tick within each hour: it stays near 0.10-0.30 from 00:00
          through 13:00, climbs to 0.65 at 15:00 as the city warms past 16 °C, and settles near 1.0 from 17:00
          onward when the daily-max at London City crosses 17 °C.**

          **Left axis:** temperature (°C). **Right axis:** Polymarket Yes-price for the 17 °C bucket (0-1, dashed). **X-axis:** local hour-of-day, Europe/London.
  - widgets:
      - name: London 2026-04-26 hourly chart
        hideName: true
        type: chart
        chart: line
        col: 12
        file: queries/london_drill_in.sql
        x: time_label
        y:
          - london_city
          - weather_centre
          - northolt
          - heathrow
          - kenley
          - open_meteo_grid
        yLabel: Temperature (°C)
        yRight: [yes_price]
        yRightLabel: Yes-probability
        seriesNames:
          london_city: London City EGLC (primary)
          weather_centre: Weather Centre EGRB
          northolt: Northolt EGWU
          heathrow: Heathrow EGLL
          kenley: Kenley
          open_meteo_grid: Open-Meteo grid
          yes_price: Polymarket Yes-price
  - widgets:
      - name: Sources, tools, and limitations - London 2026-04-26 overlay
        type: text
        col: 12
        content: |
          **Sources:** **[Meteostat](https://meteostat.net)**, **[Open-Meteo](https://archive-api.open-meteo.com/v1/archive)**, **[Polymarket CLOB](https://clob.polymarket.com/prices-history)**.

          **Tools:** **Bruin cli** (pipeline), **BigQuery** (warehouse), **Bruin dac** (visualization).

          **Limitations:** Stations are sampled at the top of every UTC hour, so sub-hour spikes can fall between
          samples - only the recovery leg shows in the archive. The dashed price line is the last CLOB tick within
          each hour; intra-hour movement is not visible. London's overall Polymarket tick coverage is sparser than
          Seoul's or Toronto's - this near-threshold day was chosen because it has full tick coverage; the strict-
          threshold London anomaly on 2026-04-19 had no archived ticks for its winning bucket. Trader identity and
          on-chain wallet attribution are out of scope. (Dual-axis line chart provided by a fork-local DAC patch -
          see `DAC.md`.)

  # 2026-04-08 Toronto - Pearson CYYZ primary anomaly
  - widgets:
      - name: Toronto 2026-04-08 overview
        type: text
        col: 12
        content: |
          # 2026-04-08 - every Toronto sensor (with the 6 °C-bucket Yes-price overlaid)

          **Hourly air temperature for the five Toronto-area METAR-fed stations plus the Open-Meteo gridded reanalysis
          across the 24 hours of 2026-04-08 local. At 17:00 Pearson (the Polymarket resolution station) reads 6.2 °C
          while same-city peers average 3.1 °C - peer-residual +3.1 °C, robust peer-z 21. The Polymarket Yes-price
          for the 6 °C bucket is the last tick within each hour: it trades in the 0.20-0.35 range from 00:00 through
          16:00, climbs to ~0.87 at 16:00 and ~0.99 by 17:00 as Pearson's reading crosses 6 °C, then holds near 1.0
          for the rest of the day.**

          **Left axis:** temperature (°C). **Right axis:** Polymarket Yes-price for the 6 °C bucket (0-1, dashed). **X-axis:** local hour-of-day, America/Toronto.
  - widgets:
