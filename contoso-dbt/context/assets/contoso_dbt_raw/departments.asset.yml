name: contoso_dbt_raw.departments
type: bq.source
description: |-
  Department master table for Contoso retail operations, defining the organizational structure and hierarchy across all business units. This reference table contains the complete catalog of operational departments within the company, serving as the foundation for employee assignments, cost center allocation, and organizational reporting.

  The dataset represents a flat organizational structure with 12 core departments spanning retail operations, corporate functions, and support services. Each department is assigned a unique cost center for financial tracking and budget allocation. The hierarchical structure is supported through parent-child relationships, enabling multi-level organizational analysis and reporting rollups.

  Key relationships: Referenced by employees (department_key), payroll records, and budget allocation systems. Acts as a dimension table for all workforce and financial analytics, providing organizational context for performance metrics, headcount reporting, and cost center analysis.

  Data characteristics: parent_department_key stored as FLOAT due to nullable nature (top-level departments have no parent); cost_center follows a standardized alphanumeric format for accounting integration; department names are standardized business function labels.

