columns:
  - name: date
    type: TIMESTAMP
    description: The date for which the exchange rate is valid (market close rates)
  - name: exchange
    type: NUMERIC
    description: The exchange rate multiplier to convert from_currency to to_currency (decimal precision)
  - name: extracted_at
    type: TIMESTAMP
    description: Timestamp when this record was extracted from the source system during data ingestion
  - name: from_currency
    type: STRING
    description: The base currency code (ISO 4217 format, e.g., USD, EUR, GBP)
  - name: to_currency
    type: STRING
    description: The target currency code to convert to (ISO 4217 format, e.g., USD, EUR, GBP)
