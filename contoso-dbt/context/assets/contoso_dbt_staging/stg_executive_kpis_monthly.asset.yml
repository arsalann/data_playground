columns:
  - name: year
    type: INTEGER
    description: Calendar year (YYYY format) for the reporting period
    primary_key: true
  - name: month
    type: INTEGER
    description: Calendar month (1-12) for the reporting period
    primary_key: true
  - name: total_revenue_usd
    type: NUMERIC
    description: Total gross revenue in US dollars for all sales transactions during the month, converted from original currencies
  - name: total_cost_usd
    type: NUMERIC
    description: Total cost of goods sold (COGS) in US dollars for all products sold during the month
  - name: gross_profit_usd
    type: NUMERIC
    description: Gross profit in US dollars (total_revenue_usd - total_cost_usd) before operating expenses
  - name: gross_margin_pct
    type: NUMERIC
    description: Gross profit margin as a percentage (gross_profit_usd / total_revenue_usd * 100), key profitability metric
  - name: total_opex_usd
    type: FLOAT
    description: Total operating expenses in US dollars from general ledger, includes all non-COGS operational costs
  - name: headcount
    type: INTEGER
    description: Total number of employees on payroll during the month, used for efficiency calculations
  - name: total_payroll_usd
    type: FLOAT
    description: Total gross payroll expenses in US dollars for all employees during the month
  - name: revenue_per_employee
    type: NUMERIC
    description: Revenue efficiency ratio in USD (total_revenue_usd / headcount), measures workforce productivity
  - name: order_count
    type: INTEGER
    description: Total number of unique sales orders processed during the month, indicates business volume
  - name: support_tickets
    type: INTEGER
    description: Total number of customer support tickets opened during the month, service demand indicator
  - name: avg_satisfaction
    type: FLOAT
    description: Average customer satisfaction score (0-10 scale) for resolved support tickets during the month
