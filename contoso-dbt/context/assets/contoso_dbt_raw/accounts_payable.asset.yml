name: contoso_dbt_raw.accounts_payable
type: bq.source
description: |-
  Raw accounts payable transactions representing money owed by Contoso to vendors and suppliers. This table captures invoice lifecycle from receipt through payment, enabling cash flow management, vendor payment tracking, and financial reporting. Each record represents a unique invoice with payment terms, departmental allocation, and current payment status.

  The data flows from Contoso's ERP system and likely feeds into GL journal entries for financial consolidation. Payment status tracking enables accounts payable aging reports and cash flow forecasting. Department allocation supports cost center accounting and budget tracking.

