name: contoso_dbt_reports.rpt_profit_and_loss
type: bq.source
description: |-
  Comprehensive monthly Profit & Loss statement for Contoso company, providing a complete financial performance view with budget variance analysis. This executive-level financial report consolidates revenue from sales transactions, cost of goods sold, and departmental operating expenses into a standard P&L format suitable for board reporting and financial analysis.

  The report synthesizes data from multiple sources: actual revenue and COGS are calculated from transactional sales data (2.3M+ transactions), while operating expenses are sourced from general ledger journal entries aggregated by department and account code. Budget comparisons enable variance analysis to identify departments and expense categories that are over/under budget.

  Line items follow standard accounting presentation order using sort_order for proper financial statement hierarchy: Revenue → COGS → Gross Profit → detailed OpEx by account → Total OpEx → Operating Income. Operating expense line items are indented with leading spaces to show the rollup structure, with detailed accounts (indented) rolling up to category totals.

  The variance analysis compares actual vs budgeted amounts, calculating both absolute variance (amount - budget_amount) and percentage variance ((actual - budget) / budget * 100). This supports monthly financial close processes, department-level budget accountability, and executive dashboard reporting.

  Key business insights: Enables identification of cost center performance, seasonal revenue patterns, margin analysis by period, and budget forecast accuracy. Synthetic data represents typical mid-market company financial structure with multiple departments and standard chart of accounts.

