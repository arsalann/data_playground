name: contoso_dbt_raw.campaigns
type: bq.source
description: |-
  Master table for marketing campaigns at Contoso, containing campaign definitions, budgets, and basic metadata.

  This table serves as the central repository for campaign planning and tracking across all marketing channels.
  Each campaign targets specific product segments and customer demographics, with defined budgets and time periods.

  **Data Sources**: Imported from Contoso's marketing planning system via dlt ingestion
  **Business Purpose**: Campaign planning, budget allocation, performance tracking foundation
  **Update Pattern**: Batch daily updates, primarily append-only with occasional updates to active campaigns

  **Relationships**:
  - Links to products table via product_key (many campaigns can promote the same product)
  - Feeds into ad_spend_daily via campaign_key for granular spend tracking (1:many)
  - Connects to campaign_attribution for customer journey analysis (1:many)
  - Aggregated in stg_marketing_performance for executive reporting with calculated ROAS, CPA, and CTR metrics

  **Key Business Logic**: Budget vs actual spend variance analysis, campaign duration tracking, channel performance comparison

  Imported table: contoso_dbt_raw.campaigns
