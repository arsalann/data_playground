name: contoso_dbt_raw.customers
type: bq.source
description: |-
  Customer dimension table for the Contoso retail business, sourced from Microsoft's SQLBI Contoso V2 dataset. Contains demographic, geographic, and personal information for ~105K customers worldwide who have engaged with Contoso's retail operations.

  This table implements a slowly changing dimension (SCD2) pattern with start_dt/end_dt for historical tracking of customer attribute changes. Geographic data includes precise coordinates for location-based analytics. Customer records span multiple continents with detailed address information.

  The data is used extensively across the business for customer segmentation, geographic analysis, demographic reporting, and as the primary customer dimension in sales fact tables. The customer_key serves as the primary identifier linking to orders (~980K), sales transactions (~2.3M), and support interactions.

  Note: Contains both abbreviated (country, state) and full-text (country_full, state_full) geographic descriptors for reporting flexibility.

  Imported table: contoso_dbt_raw.customers
  Extracted at: 2026-04-24T13:54:00Z
  Created at: 2026-04-24T13:40:58Z
  Last modified: 2026-04-24T13:44:12Z
