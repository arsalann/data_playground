name: contoso_dbt_raw.ad_spend_daily
type: bq.source
description: |-
  Daily advertising spend performance data for marketing campaigns across various channels. This synthetic dataset (Faker-generated) tracks daily-level spend allocation, audience reach, and engagement metrics for each campaign.

  The table serves as the primary source for marketing performance analysis, feeding into campaign ROI calculations and channel-level spend efficiency reporting. Each record represents a single campaign's performance on a specific date, capturing the full marketing funnel from impressions to conversions.

  Used extensively in downstream models to calculate key marketing metrics including CTR (click-through rate), conversion rates, CPA (cost per acquisition), and ROAS (return on ad spend). Data is aggregated by campaign in the staging layer and rolled up by channel and time periods for executive reporting.

