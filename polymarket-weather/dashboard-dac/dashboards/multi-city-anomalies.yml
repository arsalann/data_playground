          FROM `bruin-playground-arsalan.polymarket_weather_report.anomalies_top_n`
          WHERE city = 'Toronto' AND rank <= 10
          ORDER BY rank
        columns:
          - {name: rank, label: Rank}
          - {name: time_local, label: Time (EDT)}
          - {name: station, label: Station}
          - {name: primary_flag, label: "Primary?"}
          - {name: temp_c, label: Temp (°C)}
          - {name: peer_median, label: Peer median (°C)}
          - {name: peer_residual, label: Residual (°C)}
          - {name: peer_z, label: Peer-z}
          - {name: anomaly_direction, label: Direction}

  # Footnote
  - widgets:
      - name: Sources, tools, and limitations
        type: text
        col: 12
        content: |
          **Sources:** **[Meteostat](https://meteostat.net)** (NOAA ISD METAR/SYNOP feeds), **[Open-Meteo](https://archive-api.open-meteo.com/v1/archive)** (ECMWF ERA5 gridded reanalysis at city centre), **[Polymarket Gamma + CLOB](https://gamma-api.polymarket.com)** (event metadata + tick-level price history).

          **Tools:** **Bruin cli** (pipeline), **BigQuery** (warehouse), **Bruin dac** (visualization).

          **Limitations:** Stations are sampled at the top of every UTC hour, so sub-hour spikes can fall between samples - only the recovery leg shows in the archive. Polymarket Yes-price ticks are only ingested for the four focus cities; coverage is densest for late-March through April 2026 markets and may be sparse or absent on earlier dates. The peer self-join uses 4-5 same-city stations - cities with fewer co-located stations have a noisier peer median. Toronto substitutes for Shanghai (rank #3 by volume) because Shanghai-Pudong (ZSPD) is not in Meteostat's station database.
