name: contoso_dbt_raw.products
type: bq.source
description: |-
  Product dimension table for Contoso retail business, sourced from Microsoft's SQLBI Contoso V2 dataset. Contains master product catalog with ~2.5K consumer goods across multiple categories including clothing, electronics, accessories, and home goods.

  This table serves as the primary product dimension in the data warehouse, providing hierarchical product classification through category/subcategory structure, cost and pricing information for margin analysis, physical attributes for shipping calculations, and brand/manufacturer details for vendor management.

  The data is heavily used in sales analytics, joined to the sales fact table (~2.3M transactions) via product_key to enrich sales transactions with product attributes. Essential for product performance analysis, pricing strategy, inventory management, and category reporting.

  Product catalog includes international brands with pricing in various currencies, weight specifications for logistics planning, and color variants for inventory tracking. The cost vs price spread enables margin analysis across the product portfolio.

  Imported table: contoso_dbt_raw.products
