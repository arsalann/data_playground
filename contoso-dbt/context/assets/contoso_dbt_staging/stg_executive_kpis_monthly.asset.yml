name: contoso_dbt_staging.stg_executive_kpis_monthly
type: bq.source
description: |-
  Executive monthly KPI dashboard table aggregating key performance indicators across all business functions
  of Contoso (a fictional consumer electronics retailer). This table provides C-level executives with a
  unified view of business performance by combining financial, operational, and customer metrics.

  The table joins data from 4 upstream staging models:
  - Sales performance (revenue, costs, profit, orders) from sales transactions
  - Financial operations (OpEx) from general ledger actuals
  - Workforce metrics (headcount, payroll) from HR systems
  - Customer support performance (tickets, satisfaction) from support systems

  Key derived metrics include gross margin percentage and revenue per employee efficiency ratios.
  Each row represents one month of cross-departmental business performance for executive reporting.

  Data spans 9+ years of monthly business operations. Used primarily for executive dashboards,
  board reporting, and high-level trend analysis across all business functions.

  Technical notes: Uses LEFT JOINs with COALESCE to handle missing data in supporting departments.
  SAFE_DIVIDE prevents division-by-zero errors in ratio calculations.

  Source: dbt model that aggregates from contoso_dbt_staging tables (sales_fact, financial_summary_monthly,
  payroll_summary_monthly, support_metrics_monthly)

