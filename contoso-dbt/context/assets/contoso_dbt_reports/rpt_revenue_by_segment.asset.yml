name: contoso_dbt_reports.rpt_revenue_by_segment
type: bq.source
description: |-
  Monthly revenue performance report for Contoso retail business, aggregated by geographic (store country) and product (category) segments. This executive-level business intelligence report provides comprehensive sales analytics by combining transactional data from 2.3M+ sales records into strategic insights for category management, territory performance analysis, and growth trend monitoring.

  The report aggregates granular sales transactions from the staging sales fact table into monthly summaries, calculating key performance indicators including revenue, costs, profits, margins, and growth metrics. Each row represents a unique combination of time period (month/year), geographic market (store_country), and product category (category_name), enabling multidimensional analysis of business performance.

  Key business applications include: territory manager performance tracking, product category profitability analysis, seasonal trend identification, market penetration assessment, and executive dashboard reporting. The growth metrics (revenue_mom, revenue_yoy) support trend analysis and forecasting initiatives for strategic planning.

  Data transformations include: aggregation of transactional sales data by segment dimensions, calculation of average order values and margin percentages, computation of month-over-month and year-over-year growth rates, and standardization to USD for consistent financial reporting across international operations.

  This report serves as a foundational dataset for business intelligence tools, feeding into executive dashboards, territory planning systems, and category management analytics. The aggregated nature (8,352 rows vs 2.3M transaction records) provides optimal performance for analytical queries while preserving essential business insights.

