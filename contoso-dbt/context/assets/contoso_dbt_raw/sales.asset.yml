name: contoso_dbt_raw.sales
type: bq.source
description: |-
  Sales line items fact table for the Contoso retail business, containing detailed transaction data for individual product purchases. This table represents the granular level of the sales data model, where each row corresponds to a single product line item within a customer order.

  The sales table serves as the core transactional fact table, linking to dimension tables (customers, products, stores) via foreign keys to enable comprehensive retail analytics. It captures both local currency pricing and associated exchange rates for multi-currency revenue analysis across Contoso's global operations.

  Key business characteristics:
  - Contains ~2.3M individual line item transactions from 2016 onwards
  - Linked to ~980K orders via order_key, representing detailed breakdown of order_rows
  - Includes both unit-level (unit_price, unit_cost) and line-level (net_price, quantity) metrics
  - Multi-currency support with currency_code and exchange_rate for global revenue analysis
  - Used downstream in staging models (stg_sales_fact) for reporting and analytics

  Data lineage: Raw sales transactions → stg_sales_fact → reports (revenue_by_segment, profit_and_loss, etc.)

  The line_number field suggests some orders contain multiple line items for the same or different products, enabling analysis of basket composition and cross-selling patterns.

  Import metadata:
  Extracted at: 2026-04-24T13:54:00Z
  Created at: 2026-04-24T13:40:56Z
  Last modified: 2026-04-24T13:47:01Z
