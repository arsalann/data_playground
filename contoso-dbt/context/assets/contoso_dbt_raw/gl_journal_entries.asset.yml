name: contoso_dbt_raw.gl_journal_entries
type: bq.source
description: |-
  Core general ledger journal entries representing all double-entry accounting transactions in Contoso's financial system. Each record captures a single side (debit or credit) of a financial transaction with account classification, monetary values, and departmental allocation. This table forms the foundation for all financial reporting, trial balances, and financial statements.

  The data follows standard double-entry bookkeeping principles where each financial transaction generates paired debit and credit entries that must balance. Entries are categorized by chart of accounts codes and allocated to departments for cost center reporting. The source_key and source_table fields enable traceability back to originating business transactions (sales, purchases, payroll, etc.).

  This synthetic dataset represents realistic accounting transactions generated for the Contoso demo environment, enabling comprehensive financial analytics and reporting pipeline development without exposing real financial data.

