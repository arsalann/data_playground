columns:
  - name: account_code
    type: STRING
    description: Chart of accounts identifier following standard numbering convention (4xxx=Revenue, 5xxx=COGS, 6xxx=OpEx, 1xxx=Assets). Used to categorize budget line items and link to general ledger transactions for variance analysis.
    checks:
      - name: not_null
  - name: account_name
    type: STRING
    description: Human-readable description of the account for reporting and analysis. Provides business context for the numerical account code (e.g., "Marketing Expenses", "Software Licenses").
    checks:
      - name: not_null
  - name: budget_amount
    type: FLOAT
    description: Planned financial amount for this account/department/period combination, denominated in the specified currency. Positive values typically indicate expenses or assets, negative values may indicate revenue depending on accounting conventions.
  - name: budget_key
    type: INTEGER
    description: Primary identifier for each budget entry. Used for deduplication during data processing and ensures unique identification across fiscal periods and organizational dimensions.
    checks:
      - name: not_null
      - name: unique
  - name: currency
    type: STRING
    description: Currency denomination for the budget_amount (e.g., USD, EUR, GBP). Enables multi-currency budgeting for global operations and proper financial consolidation.
    checks:
      - name: not_null
  - name: department_key
    type: INTEGER
    description: Foreign key linking to the departments dimension table. Enables budget allocation and tracking by organizational unit, supporting departmental cost center accounting and management reporting.
    checks:
      - name: not_null
  - name: extracted_at
    type: TIMESTAMP
    description: ETL timestamp indicating when this record was loaded from the source system. Used for data lineage tracking, incremental processing, and deduplication logic in downstream transformations.
    checks:
      - name: not_null
  - name: fiscal_month
    type: INTEGER
    description: Fiscal month number (1-12) for the budget period. Combined with fiscal_year to define the specific monthly period this budget applies to, supporting time-series budget analysis.
    checks:
      - name: not_null
  - name: fiscal_year
    type: INTEGER
    description: Fiscal year for the budget period. Combined with fiscal_month to define the temporal scope of budget planning and enable year-over-year budget comparisons.
    checks:
      - name: not_null
