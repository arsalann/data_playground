  Imported table: contoso_dbt_staging.stg_inventory_health
  Extracted at: 2026-04-24T13:54:00Z
  Created at: 2026-04-24T13:47:43Z
  Last modified: 2026-04-24T13:47:43Z
  Row count: 14,800
  Size: 1.88 MB

  Staging table providing real-time inventory health metrics for the Contoso retail organization. This asset combines the latest inventory snapshots with product and store dimensional data to create a comprehensive view of stock levels, reorder requirements, and stockout risks across all store locations.

  Key transformations applied:
  - Deduplicates inventory snapshots, products, and stores using latest extracted_at timestamp
  - Selects most recent snapshot per store/product combination based on snapshot_date
  - Derives is_below_reorder boolean flag comparing quantity_on_hand to reorder_point
  - Creates stockout_risk categorization: Critical (0 stock), Low Stock (below reorder), Adequate (1-3x reorder point), Overstocked (>3x reorder point)
  - Enriches with product names, categories, and store country information via dimensional joins

  This staging table serves as the foundation for inventory management dashboards, automated reorder alerts, and stockout prevention analytics. Each row represents the current inventory position for a specific product at a specific store. The stockout_risk field enables priority-based inventory management, while is_below_reorder provides a simple trigger for reorder workflows.

  Data represents the latest snapshot for each store/product combination from the ~300K rows in the raw inventory_snapshots table, filtered to active inventory positions only.
