columns:
  - name: active_headcount
    type: INTEGER
    description: Number of active employees in the department at the end of the quarter. Represents current staffing levels for capacity planning and organizational sizing. Excludes terminated employees but includes all employees with 'Active' status regardless of temporary leave arrangements.
    checks:
      - name: not_null
      - name: min
        value: 0
  - name: avg_salary
    type: FLOAT
    description: Average annual gross salary in local currency for active employees in the department during the quarter. Calculated as mean of all active employee base salaries, excluding bonuses and variable compensation. Used for compensation benchmarking and budget planning across departments.
    checks:
      - name: not_null
      - name: min
        value: 0
  - name: avg_tenure_months
    type: FLOAT
    description: Average employee tenure in months for active employees in the department as of quarter end. Calculated from hire_date to quarter end date. Key retention metric indicating departmental stability, experience levels, and knowledge retention risk. Higher values suggest stable, experienced teams.
    checks:
      - name: not_null
      - name: min
        value: 0
  - name: cost_per_employee
    type: FLOAT
    description: Average quarterly payroll cost per active employee, calculated as quarterly_payroll_cost divided by active_headcount. Operational efficiency metric enabling cost comparison across departments and identification of high-cost areas for budget optimization and resource allocation decisions.
    checks:
      - name: not_null
      - name: min
        value: 0
  - name: department_name
    type: STRING
    description: Human-readable department name (e.g., Sales, Marketing, Engineering, HR) serving as the primary organizational dimension. Links to the departments master table and enables departmental comparison analysis and organizational hierarchy reporting for management dashboards.
    checks:
      - name: not_null
  - name: new_hires
    type: INTEGER
    description: Number of employees hired during the quarter with hire_date falling within the quarter date range. Growth indicator for departmental expansion, talent acquisition effectiveness, and organizational scaling patterns. Used for recruitment planning and onboarding capacity management.
    checks:
      - name: not_null
      - name: min
        value: 0
  - name: quarter
    type: INTEGER
    description: Calendar quarter number (1-4) for the reporting period. Temporal dimension enabling seasonal analysis, quarter-over-quarter comparisons, and cyclical workforce planning aligned with business cycles and budget periods.
    checks:
      - name: not_null
      - name: accepted_values
        value:
          - 1
          - 2
          - 3
          - 4
  - name: quarterly_payroll_cost
    type: FLOAT
    description: Total payroll expense for the department during the quarter in local currency, including gross pay, benefits, and employer taxes. Core financial metric for departmental budget tracking, cost center analysis, and workforce investment measurement. Aggregated from semi-monthly payroll records.
    checks:
      - name: not_null
      - name: min
        value: 0
  - name: terminations
    type: INTEGER
    description: Number of employees terminated during the quarter with termination_date falling within the quarter date range. Includes voluntary and involuntary separations. Key retention metric for identifying departmental challenges, management effectiveness, and talent retention risk areas requiring intervention.
    checks:
      - name: not_null
      - name: min
        value: 0
  - name: turnover_rate
    type: FLOAT
    description: Quarterly turnover rate calculated as (terminations / average_active_headcount) for the quarter. Expressed as decimal percentage (e.g., 0.15 = 15% turnover). Critical retention metric for benchmarking departmental performance, identifying problem areas, and measuring HR intervention effectiveness.
    checks:
      - name: not_null
      - name: min
        value: 0
      - name: max
        value: 2
  - name: year
    type: INTEGER
    description: Calendar year for the reporting period. Combined with quarter to define the temporal scope for workforce measurement. Enables year-over-year analysis, historical trend identification, and multi-year strategic workforce planning and forecasting.
    checks:
      - name: not_null
