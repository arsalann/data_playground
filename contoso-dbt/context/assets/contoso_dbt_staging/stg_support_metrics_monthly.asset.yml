name: contoso_dbt_staging.stg_support_metrics_monthly
type: bq.source
description: |-
  Monthly aggregated customer support metrics for Contoso, providing a comprehensive
  view of support operations performance by month. This staging table transforms the
  raw support_tickets data (~150K records) into monthly rollups for executive reporting
  and operational analysis.

  The transformation deduplicates support tickets by support_ticket_key using the
  latest extracted_at timestamp, then aggregates key metrics including resolution
  times, satisfaction scores, channel distribution, and priority breakdowns. Each
  row represents one month's worth of support activity with the most common ticket
  category identified as the "top_category" for that period.

  This table serves as the foundation for support dashboards, monthly business reviews,
  and trend analysis. Resolution time calculations only include tickets that have been
  resolved (resolved_date is not null), while satisfaction scores are averaged across
  all tickets with recorded feedback.

  Part of the dbt+dlt comparison pipeline that mirrors the original Bruin contoso
  pipeline for benchmarking purposes.

  Imported table: contoso_dbt_staging.stg_support_metrics_monthly
  Extracted at: 2026-04-24T13:54:00Z
