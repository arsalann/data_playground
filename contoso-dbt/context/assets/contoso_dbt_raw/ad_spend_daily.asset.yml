columns:
  - name: ad_spend_key
    type: INTEGER
    description: Unique identifier for each daily advertising spend record. Primary key ensuring each campaign-date combination has a distinct entry.
    checks:
      - name: not_null
      - name: unique
  - name: campaign_key
    type: INTEGER
    description: Foreign key reference to the campaigns table. Links spend data to campaign metadata including name, channel, duration, and budget information.
    checks:
      - name: not_null
  - name: channel
    type: STRING
    description: Marketing channel or platform where ads were placed (e.g., Google Ads, Facebook, LinkedIn, Display). Used for channel-level ROI analysis and budget allocation decisions.
    checks:
      - name: not_null
  - name: clicks
    type: INTEGER
    description: Total number of ad clicks received on this campaign for this date. Key engagement metric used to calculate click-through rate and cost-per-click.
    checks:
      - name: not_null
  - name: conversions
    type: INTEGER
    description: Number of desired actions completed (purchases, signups, etc.) attributed to this campaign on this date. Used to calculate conversion rate and cost-per-acquisition.
    checks:
      - name: not_null
  - name: currency
    type: STRING
    description: Currency code for the spend_amount field. Important for multi-currency campaigns before conversion to USD in downstream models.
  - name: extracted_at
    type: TIMESTAMP
    description: Technical metadata timestamp indicating when this record was last extracted/loaded by the dlt pipeline. Used for data lineage and deduplication logic.
    checks:
      - name: not_null
  - name: impressions
    type: INTEGER
    description: Total number of times ads were displayed to users for this campaign on this date. Top-of-funnel metric used to calculate reach and click-through rates.
    checks:
      - name: not_null
  - name: spend_amount
    type: FLOAT
    description: Total advertising spend amount for this campaign on this date in the specified currency. Core metric for ROI calculations and budget tracking.
    checks:
      - name: not_null
  - name: spend_date
    type: DATE
    description: Date when the advertising spend and performance metrics occurred. Provides daily granularity for time-series analysis and period-over-period reporting.
    checks:
      - name: not_null
