name: contoso_dbt_raw.shipments
type: bq.source
description: |-
  Order fulfillment records from Contoso's logistics system tracking the shipping and delivery lifecycle of customer orders.

  This table captures detailed shipping information for each order fulfillment, including carrier details,
  shipping costs, tracking information, and delivery status. Each row represents one shipment which may
  contain all or part of a customer order. Multiple shipments may exist for a single order in cases of
  split fulfillment (partial shipments, out-of-stock items, multi-warehouse fulfillment).

  Key business characteristics:
  - Critical for delivery SLA monitoring and shipping performance analysis
  - Used to calculate fulfillment metrics: days-to-ship, transit times, delivery rates
  - Enables carrier performance comparison and shipping cost optimization
  - Links orders to their physical fulfillment via order_key foreign key
  - Contains both successful deliveries and exceptions (returned, lost shipments)

  Data relationships:
  - shipments.order_key → orders.order_key (many-to-one, supports split shipments)
  - shipments.store_key → stores.store_key (many-to-one, fulfillment location)
  - Used downstream in stg_shipping_performance for analytics and rpt_delivery_sla for SLA reporting

  Business rules and patterns:
  - Shipment lifecycle: order placed → shipped → in-transit → delivered/returned/lost
  - Ship_date should always be >= order_date (calculated in staging)
  - Delivery_date may be null for in-transit/lost shipments or pickup orders
  - Ship_cost includes carrier charges but excludes product costs
  - Currency field indicates ship_cost denomination for multi-currency operations

  Import metadata:
  Extracted at: 2026-04-24T13:54:00Z
