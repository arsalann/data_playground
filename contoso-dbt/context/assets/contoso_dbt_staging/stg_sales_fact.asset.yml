name: contoso_dbt_staging.stg_sales_fact
type: bq.source
description: |-
  Denormalized sales fact table for Contoso consumer electronics retail chain. Combines sales transactions with customer, product, store, and date dimensions for analytics and reporting. Each row represents a line item from a customer order, with standardized USD amounts calculated using daily exchange rates.

  This staging model deduplicates raw source tables and enriches sales transactions with dimensional attributes including customer demographics, product categories, store locations, and calendar dimensions. All monetary values are converted to USD for consistent cross-currency analysis.

  Derived metrics include profit calculations and margin percentages. The table supports retail analytics across customer segments, product performance, geographic regions, and time periods. Typically used for revenue analysis, customer behavior studies, and operational reporting.

  Source data spans ~2.3M order line items from the Contoso V2 dataset with synthetic enhancements.

