name: contoso_dbt_raw.order_rows
type: bq.source
description: |-
  Order line items containing detailed product-level transaction data for Contoso's e-commerce platform. Each row represents one product purchased within an order, capturing pricing, quantity, and cost information at the most granular level.

  This fact table joins with the orders table (via order_key) for order-level information like customer, store, and dates, and with the products table (via product_key) for product attributes. With ~2.4 line items per order on average, this table captures the full detail needed for revenue analysis, inventory management, and profitability reporting.

  Raw transactional data extracted from the operational system, typically used downstream for staging models (stg_sales_fact) and revenue reporting. The net_price field represents the final line total (quantity × unit_price with any line-level adjustments), making this the authoritative source for revenue calculations.

