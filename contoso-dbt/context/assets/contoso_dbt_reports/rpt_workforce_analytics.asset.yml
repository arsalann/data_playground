name: contoso_dbt_reports.rpt_workforce_analytics
type: bq.source
description: |-
  Comprehensive quarterly workforce analytics report for Contoso retail operations, providing executive-level insights into human capital management across all 12 departments. This strategic HR dashboard consolidates employee lifecycle data, compensation analytics, and departmental performance metrics to support workforce planning, budget allocation, and organizational effectiveness initiatives.

  The report aggregates granular employee and payroll data from raw HR systems into quarterly summaries by department, enabling trend analysis of headcount changes, compensation patterns, retention metrics, and operational efficiency. Each row represents a unique department-quarter combination, providing multidimensional analysis of workforce dynamics across Contoso's 3,000+ employee base spanning 74 retail stores and corporate locations.

  Key business applications include: department manager performance tracking, compensation benchmarking and budget planning, retention strategy development, workforce cost analysis, and executive dashboard reporting for board meetings. The turnover and tenure metrics support proactive HR interventions and talent retention initiatives.

  Data transformations include: aggregation of semi-monthly payroll records into quarterly summaries, calculation of average compensation and tenure metrics, computation of hiring/termination rates for workforce planning, and derivation of cost efficiency metrics (cost per employee) for department budget optimization.

  This report serves as a foundational dataset for HR business intelligence, feeding into executive dashboards, department scorecards, and annual workforce planning cycles. The quarterly grain provides optimal balance between trend visibility and data volume for strategic decision-making.

