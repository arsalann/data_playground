name: contoso_dbt_reports.rpt_marketing_channel_roi
type: bq.source
description: |-
  Quarterly marketing channel performance and ROI analysis report, providing executive-level insights into channel effectiveness and spend efficiency across all marketing campaigns.

  This report aggregates campaign-level performance data (from stg_marketing_performance) by channel and quarter, calculating key marketing efficiency metrics including average ROAS, CPA, CTR, and conversion rates. Each row represents a channel's performance for a specific quarter, with totals for spend, impressions, clicks, conversions, and attributed revenue.

  The spend_efficiency field categorizes channels as 'High', 'Medium', or 'Low' efficiency based on ROAS thresholds, enabling quick identification of top-performing channels for budget allocation decisions. The table powers executive dashboards and quarterly business reviews, showing trends in channel performance over time.

  Used extensively for:
  - Marketing budget planning and allocation
  - Channel performance benchmarking
  - ROI trend analysis and forecasting
  - Executive reporting on marketing effectiveness
  - Strategic decisions on channel mix optimization

  Data flows from ad_spend_daily (raw campaign performance) → stg_marketing_performance (campaign aggregation) → rpt_marketing_channel_roi (channel/quarter rollup).

