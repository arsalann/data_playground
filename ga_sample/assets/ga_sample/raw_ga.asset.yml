  - name: visitStartTime
    type: INTEGER
    description: Timestamp when the visit started (in seconds since Unix epoch)
    checks:
      - name: not_null
      - name: positive
  - name: visitorId
    type: INTEGER
    description: Numeric identifier for the visitor (null in obfuscated demo dataset)
