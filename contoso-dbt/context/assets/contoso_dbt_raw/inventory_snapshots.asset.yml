columns:
  - name: extracted_at
    type: TIMESTAMP
    description: Timestamp when this record was extracted from the source system during ETL ingestion. Used for data lineage and troubleshooting extraction issues.
  - name: product_key
    type: INTEGER
    description: Foreign key identifier referencing the products dimension table. Links to product details including name, category, brand, and pricing information.
    checks:
      - name: not_null
  - name: quantity_on_hand
    type: INTEGER
    description: Current physical inventory count available for sale at the store location. Represents actual stock after accounting for sales, receipts, and adjustments. Can be zero during stockouts.
  - name: quantity_on_order
    type: INTEGER
    description: Quantity of this product currently on purchase orders but not yet received at the store. Used for demand planning and avoiding over-ordering during replenishment cycles.
  - name: reorder_point
    type: INTEGER
    description: Minimum stock threshold that triggers replenishment ordering. Set based on lead times, demand volatility, and service level targets. Critical for automated inventory management.
  - name: snapshot_date
    type: DATE
    description: Business date when the inventory count was captured. Typically represents the end-of-day inventory position. Used for time-series analysis and historical trending.
    checks:
      - name: not_null
  - name: snapshot_key
    type: INTEGER
    description: Surrogate key uniquely identifying each inventory snapshot record. Used for deduplication and as primary key in downstream transformations.
    checks:
      - name: not_null
      - name: unique
  - name: store_key
    type: INTEGER
    description: Foreign key identifier referencing the stores dimension table. Links to store details including location, size, status, and operational characteristics.
    checks:
      - name: not_null
