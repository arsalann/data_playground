columns:
  - name: extracted_at
    type: TIMESTAMP
    description: ETL extraction timestamp indicating when this record was pulled from the source system
  - name: net_price
    type: NUMERIC
    description: Final line item total in the order's currency, representing quantity × unit_price with any line-level adjustments applied. Primary metric for revenue calculations.
  - name: order_key
    type: INTEGER
    description: Foreign key linking to the orders table. Identifies which order this line item belongs to.
  - name: product_key
    type: INTEGER
    description: Foreign key linking to the products table. Identifies the specific product being purchased in this line item.
  - name: quantity
    type: INTEGER
    description: Number of units of the product ordered in this line item. Multiplied by unit_price to calculate gross line value.
  - name: row_number
    type: INTEGER
    description: Sequential line number within each order, indicating the position of this item in the order. Used for sorting and identifying specific line items.
  - name: unit_cost
    type: NUMERIC
    description: Cost basis per unit in the order's currency. Used for gross margin and profitability analysis (net_price - quantity × unit_cost = gross profit).
  - name: unit_price
    type: NUMERIC
    description: Sale price per unit in the order's currency, before any line-level adjustments. Base price used in revenue calculations.
