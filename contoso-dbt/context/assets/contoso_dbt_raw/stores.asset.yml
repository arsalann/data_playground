columns:
  - name: close_date
    type: TIMESTAMP
    description: Date when store operations ceased, null for currently active stores, used for historical analysis and lifecycle tracking
  - name: country_code
    type: STRING
    description: ISO country code or abbreviated country identifier (e.g., US, CA, UK) for geographic aggregation and regional analysis
    checks:
      - name: not_null
  - name: country_name
    type: STRING
    description: Full country name for display purposes and reporting (e.g., United States, Canada, United Kingdom)
    checks:
      - name: not_null
  - name: description
    type: STRING
    description: Textual description of store characteristics, location details, or special attributes for operational reference
  - name: extracted_at
    type: TIMESTAMP
    description: dlt ingestion timestamp indicating when this record was loaded from source system during ETL processing
    checks:
      - name: not_null
  - name: geo_area_key
    type: INTEGER
    description: Foreign key to geographic area dimension, links to standardized geographic hierarchy for regional reporting and territory management
  - name: open_date
    type: TIMESTAMP
    description: Store opening date marking start of operations, used for tenure analysis and historical performance tracking
  - name: square_meters
    type: FLOAT
    description: Total floor area of retail space in square meters, used for capacity planning, performance per square foot analysis, and operational comparisons
  - name: state
    type: STRING
    description: State, province, or administrative region where store is located (e.g., CA, NY, TX) for sub-national geographic analysis
  - name: status
    type: STRING
    description: Current operational status of store (e.g., Open, Closed, Under Construction) for filtering active locations and lifecycle reporting
    checks:
      - name: not_null
  - name: store_code
    type: INTEGER
    description: Business identifier or internal store number used in operational systems and store management, may differ from store_key
  - name: store_key
    type: INTEGER
    description: Primary key for store dimension, surrogate key used as foreign key in sales fact tables and other transactional data
    checks:
      - name: not_null
      - name: unique
