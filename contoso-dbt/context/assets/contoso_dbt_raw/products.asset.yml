  - business_area:product_management

columns:
  - name: brand
    type: STRING
    description: Product brand name as marketed to consumers (e.g., Contoso, Tailspin Toys, Adventure Works), may differ from manufacturer for licensed products
  - name: category_key
    type: INTEGER
    description: Primary key for product category, foreign key to product category hierarchy (dimension identifier)
    checks:
      - name: not_null
  - name: category_name
    type: STRING
    description: High-level product category name (e.g., Electronics, Clothing, Home & Garden, Sports & Outdoors)
    checks:
      - name: not_null
  - name: color
    type: STRING
    description: Product color variant for inventory tracking and customer selection (e.g., Black, White, Navy, Red)
  - name: cost
    type: NUMERIC
    description: Manufacturing or procurement cost per unit in original currency, used for margin analysis
  - name: extracted_at
    type: TIMESTAMP
    description: dlt ingestion timestamp indicating when this record was loaded into the data warehouse
    checks:
      - name: not_null
  - name: manufacturer
    type: STRING
    description: Company that produces or manufactures the product, may be different from brand for OEM/licensed products
  - name: price
    type: NUMERIC
    description: Retail sale price per unit in original currency, represents list price before discounts
  - name: product_code
    type: STRING
    description: Internal product SKU or identifier code used for inventory management and ordering systems
  - name: product_key
    type: INTEGER
    description: Primary key for product dimension, used as foreign key in sales fact table and other transactional data
    checks:
      - name: not_null
      - name: unique
  - name: product_name
    type: STRING
    description: Full product name as displayed to customers and in marketing materials
    checks:
      - name: not_null
  - name: sub_category_key
    type: INTEGER
    description: Primary key for product subcategory, provides granular classification within broader categories
    checks:
      - name: not_null
  - name: sub_category_name
    type: STRING
    description: Detailed product subcategory name (e.g., Smartphones, T-Shirts, Kitchen Appliances) for granular reporting
    checks:
      - name: not_null
  - name: weight
    type: NUMERIC
    description: Product weight measurement for shipping cost calculations and logistics planning
  - name: weight_unit
    type: STRING
    description: Unit of measurement for product weight (e.g., kg, lb, oz, g) corresponding to weight field
