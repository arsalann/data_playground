    type: INTEGER
    description: Unique identifier for each visit/session
    checks:
      - name: not_null
  - name: visitNumber
    type: INTEGER
    description: Sequential visit number for each visitor (1 for first visit, 2 for second, etc.)
    checks:
      - name: not_null
