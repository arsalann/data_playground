name: contoso_dbt_staging.stg_payroll_summary_monthly
type: bq.source
description: |-
  Monthly departmental payroll summary aggregating compensation data across all Contoso employees by department and month. This staging table transforms the granular semi-monthly payroll transactions into management-friendly monthly department-level metrics for workforce cost analysis, budgeting, and executive reporting.

  Each row represents one department for one month, containing aggregated compensation metrics including total gross pay, deductions, net pay, headcount, and average per-employee calculations. Data is sourced from the raw payroll transactions joined with department master data to provide both numeric department keys and human-readable department names.

  Key transformations: Semi-monthly payroll records are aggregated to monthly totals; employee counts represent unique active employees who received payroll during the month; monetary amounts are summed across all currencies (requires currency conversion in upstream processes); averages are calculated as total compensation divided by headcount.

  Downstream usage: Feeds executive KPI dashboards for workforce cost monitoring; supports departmental budget variance analysis; enables headcount trend reporting; used for year-over-year departmental cost comparison and per-employee compensation benchmarking across the organization.

  Data characteristics: Time-series data spanning ~3 years with monthly grain; 12 departments typically represented each month; headcount fluctuates with seasonal hiring/attrition; avg_gross_per_employee provides normalized cost comparison across departments of varying sizes.

  Imported table: contoso_dbt_staging.stg_payroll_summary_monthly
