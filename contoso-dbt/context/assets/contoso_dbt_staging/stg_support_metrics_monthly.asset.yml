tags:
  - customer_support
  - staging
  - monthly_aggregation
  - kpi_metrics
  - customer_experience
  - synthetic_data

columns:
  - name: avg_resolution_days
    type: FLOAT
    description: Average time in days from ticket creation to resolution for tickets that were resolved in this month, rounded to 2 decimal places
  - name: avg_satisfaction
    type: FLOAT
    description: Average customer satisfaction score (1-5 scale) for tickets with recorded feedback in this month, rounded to 2 decimal places
  - name: chat_count
    type: INTEGER
    description: Number of support tickets submitted via chat channel in this month
  - name: critical_count
    type: INTEGER
    description: Number of tickets with 'Critical' priority level created in this month
  - name: email_count
    type: INTEGER
    description: Number of support tickets submitted via email channel in this month
  - name: escalated_count
    type: INTEGER
    description: Number of tickets with 'Escalated' status in this month
  - name: month
    type: INTEGER
    description: Calendar month (1-12) extracted from ticket creation date
    checks:
      - name: not_null
  - name: open_count
    type: INTEGER
    description: Number of tickets with 'Open' status in this month
  - name: phone_count
    type: INTEGER
    description: Number of support tickets submitted via phone channel in this month
  - name: resolved_count
    type: INTEGER
    description: Number of tickets with 'Resolved' status in this month
  - name: ticket_count
    type: INTEGER
    description: Total number of support tickets created in this month across all channels and statuses
    checks:
      - name: not_null
  - name: top_category
    type: STRING
    description: The most frequently occurring support ticket category for this month (e.g., Technical Issue, Billing Question, Product Inquiry)
  - name: year
    type: INTEGER
    description: Calendar year extracted from ticket creation date
    checks:
      - name: not_null
