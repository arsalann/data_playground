columns:
  - name: cost_center
    type: STRING
    description: Unique alphanumeric identifier used by finance and accounting systems to track departmental expenses, budgets, and cost allocation for financial reporting and analysis
    checks:
      - name: not_null
  - name: department_key
    type: INTEGER
    description: Primary key identifier for each department, serving as the unique department ID referenced across all employee, payroll, and organizational systems
    checks:
      - name: unique
      - name: not_null
  - name: department_name
    type: STRING
    description: Human-readable business name of the department (e.g., Sales, Marketing, Engineering, HR) used for display purposes and organizational charts
    checks:
      - name: not_null
  - name: extracted_at
    type: TIMESTAMP
    description: Timestamp indicating when this department record was extracted from the source system during ETL processing
    checks:
      - name: not_null
  - name: parent_department_key
    type: FLOAT
    description: Foreign key reference to department_key of the parent department in organizational hierarchy; NULL for top-level departments, enabling recursive organizational structure queries
