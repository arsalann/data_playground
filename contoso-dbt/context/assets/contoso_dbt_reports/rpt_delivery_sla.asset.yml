name: contoso_dbt_reports.rpt_delivery_sla
type: bq.source
description: |-
  Monthly delivery service level agreement (SLA) performance metrics aggregated by carrier and store country for Contoso's e-commerce shipping operations. This report provides key insights into delivery performance, shipping costs, and operational efficiency across different regions and carriers.

  The data is derived from order-to-delivery journey analysis, joining shipments with their corresponding orders and store locations. Each row represents aggregated delivery metrics for a specific month, carrier, and origin country combination.

  Key business use cases:
  - Monitor carrier performance against SLA targets
  - Analyze geographic variations in delivery efficiency
  - Track cost optimization opportunities across regions
  - Identify delivery bottlenecks and operational improvements

