name: contoso_dbt_raw.inventory_snapshots
type: bq.source
description: |-
  Point-in-time inventory snapshots capturing stock levels and reorder points across all Contoso retail stores and products. This table represents the core inventory management system, tracking current stock on hand, pending orders, and reorder thresholds for demand planning and stockout prevention.

  Data is captured through periodic inventory counts and updated whenever stock movements occur. Each snapshot represents the inventory state at a specific point in time for a store-product combination. The table supports inventory health monitoring, replenishment planning, and stockout risk analysis.

  Downstream usage includes the stg_inventory_health model which deduplicates snapshots, joins with product and store dimensions, and calculates stockout risk classifications (Critical, Low Stock, Adequate, Overstocked).

  Key business insights available: reorder point breaches, zero-stock situations, overstocking patterns, and inventory turnover by product/store combinations.

