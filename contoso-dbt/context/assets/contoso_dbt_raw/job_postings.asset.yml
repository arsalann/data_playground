name: contoso_dbt_raw.job_postings
type: bq.source
description: |-
  Historical job posting records for Contoso retail operations, tracking recruitment activities across all store locations and corporate departments. This table contains comprehensive hiring data including posting timelines, application volumes, and job classifications for workforce planning and recruitment analytics.

  The dataset represents recruiting efforts across Contoso's 74-store retail network and 12 organizational departments, with postings ranging from store-level positions (sales associates, cashiers) to corporate roles. Each posting captures the full recruitment lifecycle from initial posting through closure, including applicant tracking for recruitment effectiveness analysis.

  Key relationships: References departments (department_key) for organizational context and stores (store_key) for location-based positions. Corporate roles typically have NULL store_key as they are not location-specific. Feeds into staging models for HR analytics and recruitment reporting.

  Data characteristics: store_key stored as FLOAT due to nullable nature (corporate positions); status field tracks posting lifecycle; applicant counts provide recruitment funnel metrics; posting/closure dates enable time-to-fill analysis.

