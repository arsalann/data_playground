columns:
  - name: store_key
    type: INTEGER
    description: Primary identifier for retail store location. Foreign key reference to stores dimension table.
    checks:
      - name: not_null
  - name: product_key
    type: INTEGER
    description: Primary identifier for product catalog items. Foreign key reference to products dimension table.
    checks:
      - name: not_null
  - name: snapshot_date
    type: DATE
    description: Business date of the inventory snapshot. Represents when the inventory count was taken, used to get latest position per store/product.
    checks:
      - name: not_null
  - name: store_country
    type: STRING
    description: Country where the retail store is located. Derived from stores dimension table for geographic analysis and reporting.
  - name: product_name
    type: STRING
    description: Human-readable product name from products dimension table. Used for display purposes in inventory reports and dashboards.
  - name: category_name
    type: STRING
    description: Product category classification from products dimension table. Enables category-level inventory analysis and management.
  - name: quantity_on_hand
    type: INTEGER
    description: Current physical inventory count for this product at this store location. Core metric for availability and stockout analysis.
    checks:
      - name: not_null
  - name: reorder_point
    type: INTEGER
    description: Inventory threshold level that triggers reorder workflow. When quantity_on_hand falls below this level, replenishment is required.
    checks:
      - name: not_null
  - name: quantity_on_order
    type: INTEGER
    description: Units of this product already ordered but not yet received at this store. Used to calculate total available inventory including pipeline stock.
    checks:
      - name: not_null
  - name: is_below_reorder
    type: BOOLEAN
    description: Derived flag indicating whether current stock level (quantity_on_hand) is below the reorder point threshold. Enables automated reorder alerting and filtering.
    checks:
      - name: not_null
  - name: stockout_risk
    type: STRING
    description: Categorized risk level for stockout based on current inventory position. Critical (0 stock), Low Stock (below reorder), Adequate (1-3x reorder point), Overstocked (>3x reorder point).
    checks:
      - name: not_null
