name: contoso_dbt_raw.budgets
type: bq.source
description: |-
  Monthly financial budgets by department and account for Contoso company. This table contains planned revenue and expense amounts across all organizational departments and chart of accounts, enabling budget vs actual variance analysis and financial forecasting. The data is synthetic (Faker-generated) and represents a typical corporate budgeting structure.

  Budget amounts follow standard accounting conventions where account codes indicate financial statement categories: 4xxx for Revenue, 5xxx for Cost of Goods Sold (COGS), 6xxx for Operating Expenses (OpEx), and 1xxx for Assets. Each budget entry specifies planned amounts for a specific fiscal period, department, and account combination.

  This table feeds downstream financial reporting models, particularly for variance analysis comparing planned budgets against actual general ledger transactions. The data supports monthly financial close processes, department-level cost tracking, and executive financial dashboards.

  Key characteristics: Multi-currency support, monthly granularity, departmental allocation, and standard chart of accounts integration. Budget entries may have multiple records per period/department/account that get aggregated in staging transformations.

